<!DOCTYPE html>
<html>
<body>
  <canvas id="test" width="32" height="32" style="width: 64px; height: 64px; border: 1px solid red;"></canvas>

    const canvas = document.getElementById("test");

    ctx.fillRect(0,0,16,16);
  </script>
</body>
