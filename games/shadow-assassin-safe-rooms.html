<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow Assassin</title>
  <style>
    :root {
      --bg: #060911;
      --panel: rgba(13, 19, 35, 0.9);
      --panel-border: rgba(129, 155, 255, 0.35);
      --text: #d8e1ff;
      --muted: #90a0d0;
      --accent: #7c98ff;
      --danger: #ff4d6d;
      --good: #4bf0b3;
      --shadow: 0 16px 45px rgba(0, 0, 0, 0.45);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #131e45 0%, #05070d 55%, #020308 100%);
      color: var(--text);
      overflow: hidden;
    }
    .shell {
      width: min(1200px, calc(100vw - 24px));
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(124, 152, 255, 0.35);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      background: #080d19;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .hud {
      position: absolute; inset: 14px auto auto 14px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      padding: 12px 14px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      min-width: 240px;
      z-index: 5;
    }
    .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
    .value { color: var(--text); font-weight: 700; }
    .bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; margin-bottom: 8px; }
    .fill { height: 100%; transition: width .2s linear; }
    .health { background: linear-gradient(90deg, #ff4d6d, #ff8fa3); }
    .xp { background: linear-gradient(90deg, #57ccff, #4bf0b3); }
    .cooldowns { position:absolute; right:14px; top:14px; width:270px; background:var(--panel); border:1px solid var(--panel-border); border-radius:12px; padding:12px; z-index:5; }
    .cool { margin-bottom: 8px; }
    .cool label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:4px; }
    .overlay {
      position: absolute; inset: 0; z-index: 12;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, rgba(6,8,18,.95), rgba(8,14,28,.92));
    }
    .card {
      width: min(760px, 92%);
      background: rgba(10,16,34,.92);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    h1,h2 { margin: 0 0 10px; letter-spacing: .04em; }
    .sub { color: var(--muted); margin-bottom: 18px; }
    .btns { display:flex; flex-wrap:wrap; gap:12px; }
    button {
      border: 1px solid rgba(141, 166, 255, 0.45);
      color: var(--text);
      background: linear-gradient(180deg, #273d8f, #1a2b6d);
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .diff-btn { flex: 1; min-width: 140px; text-align: left; }
    .diff-btn small { display:block; color:#c3d2ff; opacity:.85; font-weight:500; margin-top:4px; }
    .upgrade-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(210px,1fr)); gap: 12px; }
    .upgrade { background: rgba(16,22,42,.95); border:1px solid rgba(131,151,220,.3); border-radius:12px; padding:12px; cursor:pointer; }
    .upgrade:hover { border-color: var(--accent); }
    .rarity-common{ border-color:#95a8d8; }
    .rarity-rare{ border-color:#57ccff; box-shadow: 0 0 16px rgba(87,204,255,.15) inset; }
    .rarity-epic{ border-color:#be6bff; box-shadow: 0 0 18px rgba(190,107,255,.18) inset; }
    .rarity-legendary{ border-color:#ffc857; box-shadow: 0 0 20px rgba(255,200,87,.2) inset; }
    .warning {
      position:absolute; inset:0; pointer-events:none; z-index:4;
      background: radial-gradient(circle, transparent 45%, rgba(255,46,90,.35) 100%);
      opacity: 0; transition: opacity .2s;
    }
    .ability-list { margin-top: 10px; font-size: 12px; color: #b7c6f6; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="shell">
    <canvas id="game" width="1280" height="720"></canvas>
    <div class="warning" id="lowHpWarning"></div>

    <div class="hud">
      <div class="row"><span>Health</span><span class="value" id="hpText">160 / 160</span></div>
      <div class="bar"><div class="fill health" id="hpFill"></div></div>
      <div class="row"><span>Level</span><span class="value" id="lvlText">1</span></div>
      <div class="bar"><div class="fill xp" id="xpFill"></div></div>
      <div class="row"><span>Score</span><span class="value" id="scoreText">0</span></div>
      <div class="row"><span>Time</span><span class="value" id="timeText">0.0s</span></div>
      <div class="ability-list" id="abilityList">Abilities: None</div>
    </div>

    <div class="cooldowns">
      <div class="cool"><label><span>J - Slash</span><span id="cdSlash">Ready</span></label><div class="bar"><div class="fill xp" id="barSlash"></div></div></div>
      <div class="cool"><label><span>K - Dash</span><span id="cdDash">Ready</span></label><div class="bar"><div class="fill xp" id="barDash"></div></div></div>
      <div class="cool"><label><span>L - Arc Knife</span><span id="cdKnife">Ready</span></label><div class="bar"><div class="fill xp" id="barKnife"></div></div></div>
    </div>

    <div class="overlay" id="menuOverlay">
      <div class="card">
        <h1>SHADOW ASSASSIN</h1>
        <div class="sub">Choose difficulty. Enemy scaling, spawn pressure, speed, and aggression are centrally tuned.</div>
        <div class="btns">
          <button class="diff-btn" data-diff="easy">EASY<small>Safer pacing and softer enemy damage.</small></button>
          <button class="diff-btn" data-diff="normal">NORMAL<small>Balanced action with moderate intensity growth.</small></button>
          <button class="diff-btn" data-diff="hard">HARD<small>Fast enemies, harsh hits, rapid escalation.</small></button>
        </div>
      </div>
    </div>

    <div class="overlay" id="upgradeOverlay" style="display:none;">
      <div class="card">
        <h2>Choose an Ability</h2>
        <div class="sub">Rarity controls drop rates, power, and synergy depth.</div>
        <div class="upgrade-grid" id="upgradeGrid"></div>
      </div>
    </div>

    <div class="overlay" id="gameOverOverlay" style="display:none;">
      <div class="card">
        <h2>Mission Failed</h2>
        <div class="sub" id="gameOverStats"></div>
        <div class="btns"><button id="restartBtn">Restart</button></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const DIFFICULTY = {
    easy:   { enemyHp: 0.85, enemyDamage: 0.8, spawnRate: 0.9, speed: 0.9, aggression: 0.8, score: 0.9 },
    normal: { enemyHp: 1.0, enemyDamage: 1.0, spawnRate: 1.0, speed: 1.0, aggression: 1.0, score: 1.0 },
    hard:   { enemyHp: 1.3, enemyDamage: 1.25, spawnRate: 1.25, speed: 1.25, aggression: 1.25, score: 1.35 }
  };

  const RARITIES = {
    Common:    { color: '#95a8d8', weight: 62, minTime: 0 },
    Rare:      { color: '#57ccff', weight: 24, minTime: 35 },
    Epic:      { color: '#be6bff', weight: 10, minTime: 75 },
    Legendary: { color: '#ffc857', weight: 4, minTime: 120 }
  };

  const ABILITIES = [
    { id: 'bloodletter', name: 'Bloodletter Edge', rarity: 'Common', desc: 'Slash causes bleed for 3s.', tags:['slash','dot'], apply:p=>p.bleedOnSlash = true },
    { id: 'siphon', name: 'Soul Siphon', rarity: 'Rare', desc: 'Bleeding enemies heal you on death.', tags:['bleed','sustain'], apply:p=>p.healOnBleedKill += 8 },
    { id: 'blink', name: 'Shadowstep', rarity: 'Common', desc: 'Dash range +35%, grants 0.4s i-frames.', tags:['dash','defense'], apply:p=>{p.dashMult*=1.35; p.dashIframe=0.4;} },
    { id: 'echo', name: 'Echo Blade', rarity: 'Rare', desc: 'Every 3rd slash emits a wave projectile.', tags:['slash','projectile'], apply:p=>p.echoBlade=true },
    { id: 'ricochet', name: 'Ricochet Knives', rarity: 'Epic', desc: 'Arc Knives bounce once and split.', tags:['projectile'], apply:p=>p.knifeRicochet=true },
    { id: 'tempo', name: 'Assassin Tempo', rarity: 'Common', desc: 'Hit streak lowers all cooldowns.', tags:['combo','cooldown'], apply:p=>p.comboCooldown=true },
    { id: 'execution', name: 'Execution Mark', rarity: 'Epic', desc: 'Dash through marked foes for bonus crit.', tags:['dash','crit'], apply:p=>p.executionMark=true },
    { id: 'nightfall', name: 'Nightfall Covenant', rarity: 'Legendary', desc: 'Bleed + dash interactions explode for AoE.', tags:['dash','bleed','synergy'], apply:p=>p.nightfall=true }
  ];

  const c = document.getElementById('game');
  const x = c.getContext('2d');
  const menuOverlay = document.getElementById('menuOverlay');
  const upgradeOverlay = document.getElementById('upgradeOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');

  let raf = null;
  let state = null;
  const keys = new Set();

  const ui = {
    hpText: hpText, hpFill: hpFill, lvlText: lvlText, xpFill: xpFill,
    scoreText: scoreText, timeText: timeText, abilityList: abilityList,
    cdSlash: cdSlash, cdDash: cdDash, cdKnife: cdKnife,
    barSlash: barSlash, barDash: barDash, barKnife: barKnife,
    warning: lowHpWarning, overStats: gameOverStats
  };

  class Particle {
    constructor(px, py, vx, vy, life, color, size=3){ Object.assign(this,{px,py,vx,vy,life,max:life,color,size}); }
    update(dt){ this.life -= dt; this.px += this.vx*dt; this.py += this.vy*dt; this.vx *= 0.985; this.vy *= 0.985; }
    draw(){ x.globalAlpha = Math.max(this.life / this.max, 0); x.fillStyle=this.color; x.beginPath(); x.arc(this.px,this.py,this.size*(this.life/this.max+0.2),0,Math.PI*2); x.fill(); x.globalAlpha=1; }
  }

  const spawnEnemy = () => {
    const side = Math.floor(Math.random()*4);
    let ex=0, ey=0;
    if(side===0){ ex=Math.random()*c.width; ey=-30; }
    if(side===1){ ex=c.width+30; ey=Math.random()*c.height; }
    if(side===2){ ex=Math.random()*c.width; ey=c.height+30; }
    if(side===3){ ex=-30; ey=Math.random()*c.height; }
    const p = state.profile;
    const levelScale = 1 + state.elapsed/140;
    state.enemies.push({
      x: ex,y: ey,r:18,vx:0,vy:0,
      hp: Math.round((44 + state.level*4) * p.enemyHp * levelScale),
      maxHp: Math.round((44 + state.level*4) * p.enemyHp * levelScale),
      damage: (10 + state.elapsed*0.06) * p.enemyDamage,
      speed: (70 + state.elapsed*0.45) * p.speed,
      telegraph: 0, atkCd: 0, flash:0, bleed:0
    });
  };

  function startGame(diff){
    if (raf) cancelAnimationFrame(raf);
    const profile = DIFFICULTY[diff] || DIFFICULTY.normal;
    state = {
      diff, profile, elapsed: 0, score: 0, level: 1, xp: 0, xpNeed: 100,
      spawnTimer: 1.2, intensity: 1, particles: [], projectiles: [], enemies: [],
      shakes: 0, paused: false,
      player: {
        x: c.width/2,y: c.height/2,r:18,speed:250,maxHp:160,hp:160,
        iFrame:0,facing:{x:1,y:0},hitFlash:0,combo:0,comboT:0,
        bleedOnSlash:false, healOnBleedKill:0, dashMult:1, dashIframe:0,
        echoBlade:false, knifeRicochet:false, comboCooldown:false, executionMark:false, nightfall:false,
        slashCd:0,dashCd:0,knifeCd:0,slashes:0
      },
      abilities: new Set(),
      difficultyStarted: true
    };
    menuOverlay.style.display='none';
    gameOverOverlay.style.display='none';
    loop(performance.now());
  }

  function emitBurst(px,py,color,count,speed=180){
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2, s = (0.35+Math.random())*speed;
      state.particles.push(new Particle(px,py,Math.cos(a)*s,Math.sin(a)*s,0.45+Math.random()*0.4,color,2+Math.random()*2));
    }
  }

  function damageEnemy(e, amount, source){
    e.hp -= amount; e.flash = .12;
    emitBurst(e.x,e.y,'#ff6b7d',7,130);
    if(source==='slash' && state.player.bleedOnSlash) e.bleed = Math.max(e.bleed, 3);
    if(e.hp <= 0){
      const p = state.player;
      state.score += Math.round(12 * state.profile.score + state.elapsed*0.08);
      state.xp += 24;
      if (e.bleed > 0 && p.healOnBleedKill) p.hp = Math.min(p.maxHp, p.hp + p.healOnBleedKill);
      if (p.nightfall && e.bleed>0) {
        emitBurst(e.x,e.y,'#ffc857',28,260); state.shakes = Math.max(state.shakes, 8);
        for (const t of state.enemies) {
          const d = Math.hypot(t.x-e.x,t.y-e.y);
          if (d < 120 && t !== e) t.hp -= 18;
        }
      }
      emitBurst(e.x,e.y,'#ffd166',20,220);
      return true;
    }
    return false;
  }

  function doSlash(){
    const p = state.player;
    if(p.slashCd>0) return;
    p.slashCd = 0.35;
    p.slashes++;
    state.shakes = Math.max(state.shakes,3);
    emitBurst(p.x + p.facing.x*24, p.y + p.facing.y*24, '#93a4ff', 18, 210);

    let hits = 0;
    state.enemies = state.enemies.filter(e=>{
      const dx=e.x-p.x, dy=e.y-p.y, dist=Math.hypot(dx,dy);
      const forward = (dx*p.facing.x + dy*p.facing.y) / (dist || 1);
      if(dist < 92 && forward > 0.15){
        const crit = p.executionMark && e.telegraph > 0.2 ? 1.5 : 1;
        hits++;
        return !damageEnemy(e, (26 + state.level*1.5) * crit, 'slash');
      }
      return true;
    });

    if (p.echoBlade && p.slashes % 3 === 0) {
      state.projectiles.push({x:p.x,y:p.y,vx:p.facing.x*420,vy:p.facing.y*420,r:6,life:1.2,damage:22,bounce:0,owner:'player'});
    }
    if (hits>0) {
      p.combo = Math.min(p.combo + hits, 12); p.comboT = 2.5;
      if (p.comboCooldown) { p.dashCd *= 0.86; p.knifeCd *= 0.9; }
    }
  }

  function doDash(){
    const p = state.player;
    if(p.dashCd>0) return;
    p.dashCd = 1.8;
    p.iFrame = Math.max(p.iFrame, p.dashIframe || 0.18);
    const dist = 150 * p.dashMult;
    p.x += p.facing.x * dist; p.y += p.facing.y * dist;
    p.x = Math.max(p.r, Math.min(c.width-p.r, p.x));
    p.y = Math.max(p.r, Math.min(c.height-p.r, p.y));
    emitBurst(p.x,p.y,'#4bf0b3',26,300);
    state.shakes = Math.max(state.shakes,5);

    if (p.executionMark || p.nightfall) {
      state.enemies = state.enemies.filter(e => {
        if (Math.hypot(e.x-p.x,e.y-p.y) < 100) return !damageEnemy(e, p.nightfall ? 30 : 18, 'dash');
        return true;
      });
    }
  }

  function doKnife(){
    const p = state.player;
    if(p.knifeCd>0) return;
    p.knifeCd = 0.85;
    const base = Math.atan2(p.facing.y, p.facing.x);
    for(let i=-1;i<=1;i++){
      const a = base + i*0.12;
      state.projectiles.push({x:p.x,y:p.y,vx:Math.cos(a)*470,vy:Math.sin(a)*470,r:5,life:1.4,damage:18,bounce:p.knifeRicochet?1:0,owner:'player'});
    }
    emitBurst(p.x,p.y,'#57ccff',13,190);
  }

  function maybeLevelUp(){
    while(state.xp >= state.xpNeed){
      state.xp -= state.xpNeed;
      state.level++;
      state.xpNeed = Math.round(state.xpNeed*1.26);
      openUpgrade();
    }
  }

  function weightedAbilities(count=3){
    const now = state.elapsed;
    const pool = ABILITIES.filter(a => !state.abilities.has(a.id) && now >= RARITIES[a.rarity].minTime);
    const out = [];
    while (out.length < count && pool.length) {
      const total = pool.reduce((s,a)=>s+RARITIES[a.rarity].weight,0);
      let roll = Math.random()*total;
      const pick = pool.find(a => (roll -= RARITIES[a.rarity].weight) <= 0) || pool[pool.length-1];
      out.push(pick);
      pool.splice(pool.indexOf(pick),1);
    }
    return out;
  }

  function openUpgrade(){
    state.paused = true;
    upgradeOverlay.style.display='flex';
    const grid = upgradeGrid;
    grid.innerHTML='';
    const options = weightedAbilities(3);
    if (!options.length) {
      state.player.maxHp += 18; state.player.hp = Math.min(state.player.maxHp, state.player.hp + 18);
      state.paused = false; upgradeOverlay.style.display='none'; return;
    }
    options.forEach(opt => {
      const el = document.createElement('div');
      el.className = `upgrade rarity-${opt.rarity.toLowerCase()}`;
      el.innerHTML = `<strong>${opt.name}</strong><div style="font-size:11px;margin:6px 0;color:${RARITIES[opt.rarity].color}">${opt.rarity}</div><div style="font-size:12px;color:#b4c2ee">${opt.desc}</div>`;
      el.onclick = () => {
        state.abilities.add(opt.id);
        opt.apply(state.player);
        state.paused = false;
        upgradeOverlay.style.display='none';
      };
      grid.appendChild(el);
    });
  }

  function update(dt){
    if (state.paused) return;
    const p = state.player;
    state.elapsed += dt;
    state.intensity = 1 + state.elapsed / 110;

    const ax = (keys.has('a')||keys.has('arrowleft')?-1:0) + (keys.has('d')||keys.has('arrowright')?1:0);
    const ay = (keys.has('w')||keys.has('arrowup')?-1:0) + (keys.has('s')||keys.has('arrowdown')?1:0);
    const m = Math.hypot(ax,ay)||1;
    const speed = p.speed * (1 + p.combo*0.015);
    p.x += ax/m*speed*dt; p.y += ay/m*speed*dt;
    if (ax || ay) p.facing = {x:ax/m, y:ay/m};
    p.x = Math.max(p.r, Math.min(c.width-p.r,p.x));
    p.y = Math.max(p.r, Math.min(c.height-p.r,p.y));

    p.slashCd = Math.max(0,p.slashCd-dt);
    p.dashCd = Math.max(0,p.dashCd-dt);
    p.knifeCd = Math.max(0,p.knifeCd-dt);
    p.iFrame = Math.max(0,p.iFrame-dt);
    p.hitFlash = Math.max(0,p.hitFlash-dt);
    if (p.comboT > 0) p.comboT -= dt; else p.combo = 0;

    const aggression = state.profile.aggression;
    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0 && state.enemies.length < 80){
      spawnEnemy();
      state.spawnTimer = Math.max(0.3, (1.25 / state.profile.spawnRate) / state.intensity);
    }

    state.enemies = state.enemies.filter(e => {
      const dx = p.x-e.x, dy = p.y-e.y, dist = Math.hypot(dx,dy) || 1;
      const nx = dx/dist, ny = dy/dist;
      e.flash = Math.max(0,e.flash-dt);
      if (e.bleed > 0) {
        e.bleed -= dt;
        if (Math.random() < 0.35) emitBurst(e.x,e.y,'#ff8fa3',1,30);
        e.hp -= 6*dt;
      }

      e.atkCd -= dt;
      if (dist < 140*aggression && e.atkCd <= 0 && e.telegraph <= 0) e.telegraph = 0.58;
      if (e.telegraph > 0) {
        e.telegraph -= dt;
        if (e.telegraph <= 0) {
          const lunge = 360 * aggression;
          e.vx += nx * lunge; e.vy += ny * lunge;
          e.atkCd = 1.2 / aggression;
          emitBurst(e.x,e.y,'#ff4d6d',8,160);
        }
      } else {
        e.vx += nx * e.speed * dt;
        e.vy += ny * e.speed * dt;
      }
      e.vx *= 0.88; e.vy *= 0.88;
      e.x += e.vx*dt; e.y += e.vy*dt;

      if (Math.hypot(e.x-p.x,e.y-p.y) < e.r + p.r && p.iFrame <= 0) {
        p.hp -= e.damage*dt*2;
        p.hitFlash = .1;
        p.iFrame = 0.2;
        state.shakes = Math.max(state.shakes, 4);
      }

      return e.hp > 0;
    });

    state.projectiles = state.projectiles.filter(pr => {
      pr.life -= dt; pr.x += pr.vx*dt; pr.y += pr.vy*dt;
      if ((pr.x<0||pr.x>c.width||pr.y<0||pr.y>c.height) && pr.bounce > 0) {
        if (pr.x<0||pr.x>c.width) pr.vx *= -1;
        if (pr.y<0||pr.y>c.height) pr.vy *= -1;
        pr.bounce--;
      }
      let alive = pr.life > 0;
      if (pr.owner === 'player') {
        state.enemies = state.enemies.filter(e => {
          if (Math.hypot(pr.x-e.x, pr.y-e.y) < e.r + pr.r) {
            alive = false;
            return !damageEnemy(e, pr.damage, 'projectile');
          }
          return true;
        });
      }
      return alive;
    });

    state.particles = state.particles.filter(p => (p.update(dt), p.life > 0));

    maybeLevelUp();
    if (p.hp <= 0) {
      ui.overStats.textContent = `Difficulty: ${state.diff.toUpperCase()} • Time: ${state.elapsed.toFixed(1)}s • Score: ${state.score}`;
      gameOverOverlay.style.display = 'flex';
      cancelAnimationFrame(raf);
      raf = null;
    }
  }

  function draw(){
    const p = state.player;
    const shake = state.shakes > 0 ? state.shakes-- : 0;
    const sx = shake ? (Math.random()-0.5)*shake*1.6 : 0;
    const sy = shake ? (Math.random()-0.5)*shake*1.6 : 0;

    x.save();
    x.translate(sx, sy);
    const g = x.createLinearGradient(0,0,0,c.height);
    g.addColorStop(0,'#0a1328'); g.addColorStop(1,'#080d19');
    x.fillStyle = g; x.fillRect(0,0,c.width,c.height);

    for(let i=0;i<40;i++){
      x.fillStyle = `rgba(124,152,255,${0.06 + (i%4)*0.015})`;
      x.fillRect((i*173 + state.elapsed*8) % c.width, (i*97) % c.height, 2, 2);
    }

    state.projectiles.forEach(pr=>{ x.fillStyle = '#9ee7ff'; x.beginPath(); x.arc(pr.x,pr.y,pr.r,0,Math.PI*2); x.fill(); });

    state.enemies.forEach(e=>{
      if (e.telegraph > 0) { x.strokeStyle = `rgba(255,77,109,${0.35+e.telegraph*0.8})`; x.lineWidth = 2; x.beginPath(); x.arc(e.x,e.y,e.r+10,0,Math.PI*2); x.stroke(); }
      x.fillStyle = e.flash > 0 ? '#fff' : '#ff4d6d';
      x.beginPath(); x.arc(e.x,e.y,e.r,0,Math.PI*2); x.fill();
      x.fillStyle = '#fff'; x.fillRect(e.x-16,e.y-28,32,4); x.fillStyle = '#87a5ff'; x.fillRect(e.x-16,e.y-28,32*(e.hp/e.maxHp),4);
    });

    state.particles.forEach(p => p.draw());

    x.save();
    x.translate(p.x,p.y);
    x.rotate(Math.atan2(p.facing.y, p.facing.x));
    x.fillStyle = p.hitFlash > 0 ? '#fff' : '#dbe3ff';
    x.beginPath(); x.arc(0,0,p.r,0,Math.PI*2); x.fill();
    x.fillStyle = '#2a3f8b'; x.fillRect(6,-5,16,10);
    x.restore();

    x.restore();

    ui.hpText.textContent = `${Math.max(0,p.hp).toFixed(0)} / ${p.maxHp}`;
    ui.hpFill.style.width = `${(Math.max(0,p.hp)/p.maxHp)*100}%`;
    ui.lvlText.textContent = `${state.level}`;
    ui.xpFill.style.width = `${(state.xp/state.xpNeed)*100}%`;
    ui.scoreText.textContent = `${state.score}`;
    ui.timeText.textContent = `${state.elapsed.toFixed(1)}s`;
    ui.warning.style.opacity = p.hp / p.maxHp < 0.3 ? `${(0.3 - p.hp / p.maxHp) * 2}` : 0;
    ui.abilityList.textContent = `Abilities: ${[...state.abilities].map(id => ABILITIES.find(a=>a.id===id)?.name).join(', ') || 'None'}`;

    const bars = [
      ['slashCd',0.35,ui.barSlash,ui.cdSlash],
      ['dashCd',1.8,ui.barDash,ui.cdDash],
      ['knifeCd',0.85,ui.barKnife,ui.cdKnife]
    ];
    bars.forEach(([k,max,b,t])=>{
      const v = state.player[k];
      b.style.width = `${Math.max(0, 100 - (v/max)*100)}%`;
      t.textContent = v <= 0 ? 'Ready' : `${v.toFixed(1)}s`;
    });
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.033, (now-last)/1000); last = now;
    update(dt); draw();
    raf = requestAnimationFrame(loop);
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    keys.add(k);
    if (!state || state.paused) return;
    if (k === 'j') doSlash();
    if (k === 'k') doDash();
    if (k === 'l') doKnife();
  });
  document.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));

  document.querySelectorAll('.diff-btn').forEach(btn => btn.onclick = () => startGame(btn.dataset.diff));
  restartBtn.onclick = () => { menuOverlay.style.display = 'flex'; gameOverOverlay.style.display = 'none'; };
})();
</script>
</body>
</html>
