<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultra Proxy v2</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;margin:0;padding:20px}
.app{max-width:1100px;margin:0 auto}
.box{background:#1e293b;padding:24px;border-radius:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input{flex:1 1 480px;padding:12px;border-radius:8px;border:none;min-width:240px}
button{padding:12px 20px;border:none;border-radius:8px;background:#22c55e;color:white;font-weight:bold;cursor:pointer}
#frameWrap{margin-top:16px;background:#0b1220;border-radius:12px;overflow:hidden;border:1px solid #334155}
iframe{width:100%;height:70vh;border:0;background:#fff}
.note{font-size:13px;color:#cbd5e1;margin-top:10px}
</style>
</head>
<body>
<div class="app">
  <div class="box">
    <h2>Ultra Proxy v2</h2>
    <p>Enter full URL:</p>
    <div class="row">
      <input id="u" placeholder="https://example.com" value="https://example.com">
      <button id="goBtn" type="button">Go</button>
    </div>
    <div class="note">Website loads below inside this page. Some websites may block embedding.</div>
    <div id="frameWrap">
      <iframe id="proxyFrame" title="Proxy Frame" loading="lazy"></iframe>
    </div>
  </div>
</div>
<script>
function normalizeUrl(raw){
  let u=raw.trim();
  if(!u) return "";
  if(!/^https?:\/\//i.test(u)) u="https://"+u;
  return u;
}
function go(){
  const input=document.getElementById("u");
  const frame=document.getElementById("proxyFrame");
  const normalized=normalizeUrl(input.value);
  if(!normalized) return;
  input.value=normalized;
  frame.src="https://r.jina.ai/http/"+normalized.replace(/^https?:\/\//i,"");
}
document.getElementById("goBtn").addEventListener("click",go);
document.getElementById("u").addEventListener("keydown",function(e){if(e.key==="Enter") go();});
go();
</script>
</body>
</html>
