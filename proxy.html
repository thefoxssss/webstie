<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultra Proxy v2</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;
display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
.box{background:#1e293b;padding:40px;border-radius:14px}
input{width:400px;max-width:60vw;padding:12px;border-radius:8px;border:none}
button{padding:12px 20px;border:none;border-radius:8px;
background:#22c55e;color:white;font-weight:bold;margin-left:10px;cursor:pointer}
</style>
</head>
<body>
<div class="box">
<h2>Ultra Proxy v2</h2>
<p>Enter full URL:</p>
<input id="u" placeholder="https://example.com">
<button onclick="go()">Go</button>
</div>
<script>
function go(){
  let u=document.getElementById("u").value.trim()
  if(!u.startsWith("http")) u="https://"+u
  location.href="/"+encodeURIComponent(u)
}
</script>
</body>
</html>
